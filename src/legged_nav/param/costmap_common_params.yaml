# Common costmap parameters for legged robot navigation
obstacle_range: 2.5
raytrace_range: 3.5
# Robot footprint for A1 quadruped (approximate as circle for simplicity)
robot_radius: 0.4
inflation_radius: 0.6
transform_tolerance: 0.6
observation_sources: laser_scan

laser_scan:
  data_type: LaserScan
  topic: /scan
  marking: true
  clearing: true
  expected_update_rate: 0.5

map_type: costmap