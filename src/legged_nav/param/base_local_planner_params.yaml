# Local planner parameters adapted for A1 quadruped robot
TrajectoryPlannerROS:
  # Independent settings for the local costmap
  transform_tolerance: 0.3
  sim_time: 1.7
  sim_granularity: 0.025
  dwa: true
  vx_samples: 5
  vtheta_samples: 20

  # Velocity limits for A1 robot
  # Max forward speed: ~1.5 m/s (conservative: 1.0 m/s)
  max_vel_x: 1.0
  min_vel_x: -0.5
  max_vel_y: 0.0
  min_vel_y: 0.0

  # Rotational velocity limits
  max_rotational_vel: 1.5
  min_in_place_rotational_vel: 0.3

  # Goal tolerances
  xy_goal_tolerance: 0.25
  yaw_goal_tolerance: 0.15

  # Planner biases
  goal_distance_bias: 0.8
  path_distance_bias: 0.6
  occdist_scale: 0.01
  heading_lookahead: 0.325
  oscillation_reset_dist: 0.05

  # A1 is NOT holonomic (cannot strafe sideways)
  holonomic_robot: false

  # Acceleration limits
  acc_lim_th: 3.0
  acc_lim_x: 2.0
  acc_lim_y: 0.0

  # Docking behavior
  latch_xy_goal_tolerance: false
  prune_plan: true
